name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e .
      - name: Test
        run: python -m unittest discover -s tests
      - name: Compile
        run: python -m compileall -q src
      - name: CLI smoke checks
        run: |
          maintainer-agent doctor
          maintainer-agent doctor --json
          maintainer-agent doctor --json --strict
          maintainer-agent list
          maintainer-agent triage examples/issue.md --dry-run --no-prompts
          maintainer-agent import-github issue examples/github-issue.json --output /tmp/imported-issue.md
          maintainer-agent triage /tmp/imported-issue.md --dry-run --no-prompts
